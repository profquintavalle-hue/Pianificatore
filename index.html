<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pianificatore Moduli</title>
<style>
  :root{
    --carta: #F7F2E6;
    --carta-alt: #EFE7D6;
    --inchiostro: #2B241C;
    --inchiostro-tenue: #6B5F4E;
    --bordo: #D9CBAE;
    --teal: #1F5C56;
    --teal-chiaro: #3E7C74;
    --ruggine: #B3492A;
    --oliva: #7C8A4E;
    --ambra: #B8863B;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--carta);
    color:var(--inchiostro);
    font-family:-apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
    min-height:100vh;
  }
  h1,h2,h3{
    font-family:Georgia, "Iowan Old Style", serif;
    font-weight:600;
    margin:0;
  }
  .app{
    display:grid;
    grid-template-columns:260px 1fr;
    min-height:100vh;
  }
  .sidebar{
    background:var(--carta-alt);
    border-right:1px solid var(--bordo);
    padding:24px 16px;
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .sidebar h1{
    font-size:1.15rem;
    color:var(--teal);
    margin-bottom:4px;
    letter-spacing:0.2px;
  }
  .sidebar .sottotitolo{
    font-size:0.75rem;
    color:var(--inchiostro-tenue);
    margin-bottom:18px;
  }
  .tab-piano{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:9px 12px;
    border-radius:8px;
    cursor:pointer;
    font-size:0.88rem;
    border:1px solid transparent;
    color:var(--inchiostro);
  }
  .tab-piano:hover{ background:rgba(31,92,86,0.08); }
  .tab-piano.attivo{
    background:var(--carta);
    border-color:var(--bordo);
    font-weight:600;
    color:var(--teal);
  }
  .tab-piano .elimina-tab{
    opacity:0;
    color:var(--ruggine);
    font-size:0.8rem;
    padding:2px 6px;
    border-radius:4px;
  }
  .tab-piano:hover .elimina-tab{ opacity:0.7; }
  .tab-piano .elimina-tab:hover{ opacity:1; background:rgba(179,73,42,0.12); }
  .btn-nuovo-piano{
    margin-top:10px;
    padding:9px 12px;
    border-radius:8px;
    border:1px dashed var(--bordo);
    background:transparent;
    color:var(--inchiostro-tenue);
    cursor:pointer;
    font-size:0.85rem;
    text-align:left;
  }
  .btn-nuovo-piano:hover{ border-color:var(--teal); color:var(--teal); }

  .sezione-backup{
    margin-top:auto;
    padding-top:18px;
    border-top:1px solid var(--bordo);
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .titolo-backup{
    font-size:0.72rem;
    text-transform:uppercase;
    letter-spacing:0.05em;
    color:var(--inchiostro-tenue);
    font-weight:600;
    margin-bottom:2px;
  }
  .btn-backup{
    padding:8px 12px;
    border-radius:8px;
    border:1px solid var(--bordo);
    background:var(--carta);
    color:var(--inchiostro);
    cursor:pointer;
    font-size:0.82rem;
    text-align:left;
    font-family:inherit;
  }
  .btn-backup:hover{ border-color:var(--teal); color:var(--teal); }
  .nota-backup{
    font-size:0.7rem;
    color:var(--inchiostro-tenue);
    line-height:1.4;
    margin-top:2px;
  }
  .nota-backup.ok{ color:var(--oliva); font-weight:600; }
  .nota-backup.errore{ color:var(--ruggine); font-weight:600; }

  .main{ padding:28px 36px 60px; overflow-x:auto; }
  .vuoto{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:70vh;
    color:var(--inchiostro-tenue);
    text-align:center;
    gap:10px;
  }
  .vuoto button{
    margin-top:8px;
    padding:10px 18px;
    border-radius:8px;
    border:none;
    background:var(--teal);
    color:var(--carta);
    cursor:pointer;
    font-size:0.9rem;
  }

  .intestazione-piano{
    display:flex;
    align-items:baseline;
    gap:14px;
    margin-bottom:6px;
  }
  .intestazione-piano input[type=text]{
    font-family:Georgia, serif;
    font-size:1.5rem;
    font-weight:600;
    color:var(--teal);
    border:none;
    background:transparent;
    padding:2px 4px;
    border-bottom:1px solid transparent;
  }
  .intestazione-piano input[type=text]:focus{ outline:none; border-bottom:1px solid var(--bordo); }
  .sotto-intestazione{ font-size:0.82rem; color:var(--inchiostro-tenue); margin-bottom:22px; }

  .pannello{
    background:var(--carta);
    border:1px solid var(--bordo);
    border-radius:10px;
    padding:18px 20px;
    margin-bottom:20px;
  }
  .pannello summary{
    cursor:pointer;
    font-family:Georgia, serif;
    font-weight:600;
    color:var(--teal);
    font-size:1rem;
    outline:none;
  }
  .pannello[open] summary{ margin-bottom:14px; }

  .riga-campi{ display:flex; gap:18px; flex-wrap:wrap; margin-bottom:12px; }
  .campo{ display:flex; flex-direction:column; gap:4px; font-size:0.8rem; color:var(--inchiostro-tenue); }
  .campo input[type=date], .campo input[type=text], .campo input[type=number]{
    border:1px solid var(--bordo);
    border-radius:6px;
    padding:7px 9px;
    font-size:0.85rem;
    background:var(--carta);
    color:var(--inchiostro);
    font-family:inherit;
  }
  .giorni-settimana{ display:flex; gap:6px; flex-wrap:wrap; }
  .giorno-chip{
    padding:6px 10px;
    border-radius:16px;
    border:1px solid var(--bordo);
    font-size:0.78rem;
    cursor:pointer;
    color:var(--inchiostro-tenue);
    user-select:none;
  }
  .giorno-chip.attivo{ background:var(--teal); border-color:var(--teal); color:var(--carta); }

  table.tabella-moduli{ width:100%; border-collapse:collapse; font-size:0.85rem; }
  table.tabella-moduli th{
    text-align:left;
    font-size:0.72rem;
    text-transform:uppercase;
    letter-spacing:0.04em;
    color:var(--inchiostro-tenue);
    border-bottom:1px solid var(--bordo);
    padding:6px 8px;
    font-weight:600;
  }
  table.tabella-moduli td{
    padding:6px 8px;
    border-bottom:1px solid rgba(217,203,174,0.5);
    vertical-align:middle;
  }
  table.tabella-moduli input[type=text]{
    width:100%;
    border:1px solid transparent;
    background:transparent;
    padding:5px 6px;
    border-radius:5px;
    font-size:0.85rem;
    font-family:inherit;
    color:var(--inchiostro);
  }
  table.tabella-moduli input[type=text]:hover, table.tabella-moduli input[type=text]:focus{
    border-color:var(--bordo); background:var(--carta-alt); outline:none;
  }
  table.tabella-moduli input[type=number]{
    width:56px;
    border:1px solid var(--bordo);
    border-radius:5px;
    padding:5px 6px;
    font-size:0.85rem;
    text-align:center;
    font-family:inherit;
  }
  .azione-icona{
    background:none; border:none; cursor:pointer; color:var(--inchiostro-tenue);
    font-size:0.95rem; padding:3px 6px; border-radius:5px;
  }
  .azione-icona:hover{ background:var(--carta-alt); color:var(--inchiostro); }
  .azione-icona.elimina:hover{ color:var(--ruggine); }
  .btn-aggiungi{
    margin-top:12px;
    padding:7px 14px;
    border-radius:6px;
    border:1px dashed var(--bordo);
    background:transparent;
    color:var(--inchiostro-tenue);
    cursor:pointer;
    font-size:0.82rem;
  }
  .btn-aggiungi:hover{ border-color:var(--teal); color:var(--teal); }

  .riga-verifiche-modulo td{
    padding:2px 8px 8px 44px !important;
    border-bottom:1px solid rgba(217,203,174,0.5) !important;
    background:rgba(184,134,59,0.04);
  }
  .riga-verifica-inline{
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    font-size:0.78rem; color:var(--inchiostro-tenue);
    padding:4px 0;
  }
  .riga-verifica-inline select{
    padding:4px 6px; border:1px solid var(--bordo); border-radius:5px;
    font-family:inherit; font-size:0.78rem; background:var(--carta); color:var(--inchiostro);
  }
  .riga-verifica-inline input[type=number]{
    width:44px; padding:3px 5px; border:1px solid var(--bordo); border-radius:5px;
    font-size:0.78rem; text-align:center; font-family:inherit;
  }
  .riga-verifica-inline .mini-label{ display:inline-flex; align-items:center; gap:4px; white-space:nowrap; }
  .riga-verifica-inline .badge-verifica{ color:var(--ambra); font-weight:700; }
  .riga-verifica-inline .data-verifica{ font-weight:600; font-size:0.76rem; white-space:nowrap; }
  .riga-verifica-inline input[type=date]{ padding:3px 5px; border:1px solid var(--bordo); border-radius:5px; font-size:0.76rem; font-family:inherit; }
  .riga-verifica-inline .tag-auto{ font-size:0.72rem; color:var(--ambra); background:rgba(184,134,59,0.12); padding:2px 7px; border-radius:10px; white-space:nowrap; }
  .riga-verifica-inline .link-auto{ font-size:0.72rem; color:var(--teal); background:none; border:none; cursor:pointer; padding:2px 4px; white-space:nowrap; }
  .riga-verifica-inline .link-auto:hover{ text-decoration:underline; }
  .riga-verifica-inline .avviso-inline{ font-size:0.72rem; color:var(--ruggine); white-space:nowrap; }
  .riga-verifica-inline .check-prevista{ font-weight:600; color:var(--inchiostro); }
  .riga-verifica-inline.non-attiva{ opacity:0.5; }
  .riga-verifica-inline.non-attiva select, .riga-verifica-inline.non-attiva input[type=number], .riga-verifica-inline.non-attiva input[type=date]{ text-decoration:line-through; }
  .btn-aggiungi-verifica-inline{
    margin-top:2px;
    padding:3px 10px;
    border-radius:5px;
    border:1px dashed var(--bordo);
    background:transparent;
    color:var(--inchiostro-tenue);
    cursor:pointer;
    font-size:0.74rem;
  }
  .btn-aggiungi-verifica-inline:hover{ border-color:var(--ambra); color:var(--ambra); }

  .lista-eccezioni{ display:flex; flex-direction:column; gap:8px; margin-bottom:12px; }
  .riga-eccezione{ display:flex; align-items:center; gap:10px; font-size:0.83rem; }
  .riga-eccezione input[type=date]{ padding:6px 8px; border:1px solid var(--bordo); border-radius:6px; }
  .riga-eccezione input[type=text]{ flex:1; padding:6px 8px; border:1px solid var(--bordo); border-radius:6px; font-family:inherit; }
  .badge-tipo{
    font-size:0.7rem; padding:2px 8px; border-radius:10px; font-weight:600;
  }
  .badge-tipo.saltata{ background:rgba(179,73,42,0.14); color:var(--ruggine); }
  .badge-tipo.extra{ background:rgba(124,138,78,0.16); color:var(--oliva); }

  /* GANTT */
  .gantt-wrap{ margin-top:8px; }
  .gantt-riepilogo{
    display:flex; gap:22px; margin-bottom:16px; font-size:0.82rem; color:var(--inchiostro-tenue);
  }
  .gantt-riepilogo b{ color:var(--inchiostro); }
  .banner-sforo{
    background:rgba(179,73,42,0.1); border:1px solid rgba(179,73,42,0.35); color:var(--ruggine);
    border-radius:8px; padding:11px 15px; margin-bottom:14px; font-size:0.88rem; line-height:1.5;
  }
  .banner-sforo b{ color:var(--ruggine); }
  .banner-ok{
    background:rgba(124,138,78,0.1); border:1px solid rgba(124,138,78,0.3); color:var(--oliva);
    border-radius:8px; padding:11px 15px; margin-bottom:14px; font-size:0.88rem; line-height:1.5;
  }
  .banner-ok b{ color:var(--oliva); }
  .gantt-scroll{ overflow-x:auto; border:1px solid var(--bordo); border-radius:10px; background:var(--carta); }
  .gantt{ position:relative; min-width:900px; padding:14px 20px 20px; }
  .gantt-mesi{
    display:flex;
    border-bottom:1px solid var(--bordo);
    margin-bottom:10px;
    padding-bottom:6px;
  }
  .gantt-mese-label{
    font-size:0.72rem;
    text-transform:uppercase;
    letter-spacing:0.04em;
    color:var(--inchiostro-tenue);
    border-left:1px solid var(--bordo);
    padding-left:8px;
  }
  .riga-gantt{
    position:relative;
    height:40px;
    border-bottom:1px dashed rgba(217,203,174,0.6);
  }
  .riga-gantt:last-child{ border-bottom:none; }
  .riga-gantt .etichetta-modulo{
    position:absolute;
    left:0; top:0;
    font-size:0.78rem;
    color:var(--inchiostro-tenue);
    line-height:40px;
    pointer-events:none;
  }
  .barra-modulo{
    position:absolute;
    top:7px;
    height:26px;
    border-radius:6px;
    background:var(--teal-chiaro);
    display:flex;
    align-items:center;
    padding:0 10px;
    font-size:0.76rem;
    color:var(--carta);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    transition:left 0.45s cubic-bezier(.4,0,.2,1), width 0.45s cubic-bezier(.4,0,.2,1), background 0.3s;
    box-shadow:0 1px 2px rgba(43,36,28,0.15);
  }
  .barra-modulo.overflow{ background:var(--ruggine); }
  .barra-modulo.corrente{ box-shadow:0 0 0 2px var(--ambra); }
  .oggi-linea{
    position:absolute;
    top:0; bottom:0;
    width:2px;
    background:var(--ruggine);
    opacity:0.55;
  }
  .oggi-etichetta{
    position:absolute;
    top:-16px;
    font-size:0.65rem;
    color:var(--ruggine);
    transform:translateX(-50%);
    white-space:nowrap;
  }
  .verifica-marcatore{
    position:absolute;
    top:0; bottom:0;
    background:rgba(184,134,59,0.18);
    border-left:2px solid var(--ambra);
    border-right:2px solid var(--ambra);
    pointer-events:auto;
  }
  .verifica-etichetta{
    position:absolute;
    bottom:-2px;
    left:2px;
    font-size:0.62rem;
    color:var(--ambra);
    font-weight:700;
    white-space:nowrap;
    background:var(--carta);
    padding:0 3px;
    border-radius:3px;
  }

  .avviso{
    margin-top:14px;
    padding:10px 14px;
    background:rgba(179,73,42,0.09);
    border:1px solid rgba(179,73,42,0.3);
    border-radius:8px;
    font-size:0.82rem;
    color:var(--ruggine);
  }

  .mini-calendario{ margin-top:10px; }
  .mesi-calendario{ display:flex; flex-wrap:wrap; gap:18px; }
  .mese-cal{ font-size:0.72rem; }
  .mese-cal .titolo-mese{ font-weight:600; color:var(--inchiostro-tenue); margin-bottom:4px; text-align:center; text-transform:capitalize; }
  .griglia-giorni{ display:grid; grid-template-columns:repeat(7,20px); gap:2px; }
  .giorno-cella{
    width:20px; height:20px; display:flex; align-items:center; justify-content:center;
    border-radius:4px; cursor:pointer; color:var(--inchiostro-tenue);
  }
  .giorno-cella.lezione{ background:rgba(31,92,86,0.12); color:var(--teal); font-weight:600; }
  .giorno-cella.saltata{ background:var(--ruggine); color:var(--carta); }
  .giorno-cella.extra{ background:var(--oliva); color:var(--carta); }
  .giorno-cella.verifica{ background:var(--ambra); color:var(--carta); font-weight:700; }
  .giorno-cella.vuota{ cursor:default; }
  .giorno-cella:not(.vuota):hover{ outline:1px solid var(--ambra); }
  .legenda-cal{ display:flex; gap:14px; font-size:0.72rem; color:var(--inchiostro-tenue); margin-top:10px; flex-wrap:wrap; }
  .legenda-cal span{ display:inline-flex; align-items:center; gap:5px; }
  .legenda-cal i{ width:10px; height:10px; border-radius:3px; display:inline-block; }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar" id="sidebar">
    <h1>Pianificatore</h1>
    <div class="sottotitolo">Moduli didattici &middot; a cascata</div>
    <div id="lista-tab"></div>
    <button class="btn-nuovo-piano" id="btn-nuovo-piano">+ nuovo piano (classe/materia)</button>
    <div class="sezione-backup">
      <div class="titolo-backup">Backup</div>
      <button class="btn-backup" id="btn-esporta-backup">⤓ Salva backup su file</button>
      <button class="btn-backup" id="btn-importa-backup">⤒ Ripristina da file</button>
      <input type="file" id="input-file-backup" accept=".json,application/json" style="display:none">
      <div class="nota-backup" id="nota-backup">Consiglio: salva il file nel tuo Google Drive dopo modifiche importanti.</div>
    </div>
  </div>
  <div class="main" id="main"></div>
</div>

<script>
const CHIAVE_STORAGE = 'pianificatore_moduli_dati_v1';
const GIORNI_LABEL = ['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];
const MESI_LABEL = ['gennaio','febbraio','marzo','aprile','maggio','giugno','luglio','agosto','settembre','ottobre','novembre','dicembre'];
const PALETTE_BARRE = ['#3E7C74','#B8863B','#7C8A4E','#5B7BA6','#8B6BAA','#A6633E'];

function idCasuale(){ return Math.random().toString(36).slice(2,9); }
function oggiISO(){ return new Date().toISOString().slice(0,10); }

function caricaDati(){
  try{
    const raw = localStorage.getItem(CHIAVE_STORAGE);
    if(raw) return JSON.parse(raw);
  }catch(e){ console.error(e); }
  return { piani: [], pianoAttivo: null };
}
function salvaDati(){
  localStorage.setItem(CHIAVE_STORAGE, JSON.stringify(stato));
  ultimaModifica = Date.now();
}

let stato = caricaDati();
// Promemoria backup: confrontiamo l'ultima modifica con l'ultimo salvataggio su file.
let ultimaModifica = 0;   // impostata da salvaDati()
let ultimoBackup = 0;     // impostata da esportaBackup()

function nuovoPiano(){
  const p = {
    id: idCasuale(),
    nome: 'Nuova materia/classe',
    dataInizio: oggiISO(),
    dataFine: (function(){ const d=new Date(); d.setMonth(d.getMonth()+9); return d.toISOString().slice(0,10); })(),
    giorni: [1,3], // lun, mer di default (0=lun..6=dom)
    festivita: [],
    moduli: [
      { id: idCasuale(), nome: 'Modulo 1', lezioni: 4, verifiche: [] },
      { id: idCasuale(), nome: 'Modulo 2', lezioni: 4, verifiche: [] }
    ],
    eccezioni: [] // {data, tipo: 'saltata'|'extra', etichetta}
  };
  stato.piani.push(p);
  stato.pianoAttivo = p.id;
  salvaDati();
  render();
}

function pianoCorrente(){
  const p = stato.piani.find(p => p.id === stato.pianoAttivo) || null;
  if(p) p.moduli.forEach(m => {
    if(!Array.isArray(m.verifiche)) m.verifiche = [];
    m.verifiche.forEach(v => {
      if(v.attiva === undefined) v.attiva = true;
      if(v.data === undefined) v.data = null;
      if(v.qualifica === 'ordinaria') v.qualifica = 'sommativa';
      // scartoLezioni non è più usato: le date automatiche cadono subito dopo il modulo
    });
  });
  return p;
}

function eliminaPiano(id, ev){
  ev.stopPropagation();
  if(!confirm('Eliminare questo piano? Non si può annullare.')) return;
  stato.piani = stato.piani.filter(p => p.id !== id);
  if(stato.pianoAttivo === id){
    stato.pianoAttivo = stato.piani.length ? stato.piani[0].id : null;
  }
  salvaDati();
  render();
}

// ---------- Logica calendario / cascata ----------

function parseISO(s){
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}
function toISO(d){
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function giornoSettimanaLunBase(d){
  // JS: 0=domenica..6=sabato -> convertiamo a 0=lunedì..6=domenica
  return (d.getDay() + 6) % 7;
}
function inFestivita(iso, festivita){
  return festivita.some(f => iso >= f.da && iso <= f.a);
}

// Restituisce l'elenco ordinato di date-lezione (ISO) per un piano,
// tenendo conto di giorni settimanali, festività e eccezioni (saltate/extra)
function calcolaLezioniDisponibili(piano){
  const saltate = new Set(piano.eccezioni.filter(e=>e.tipo==='saltata').map(e=>e.data));
  const extra = piano.eccezioni.filter(e=>e.tipo==='extra').map(e=>e.data);
  const risultato = [];
  if(piano.dataInizio && piano.dataFine){
    let cursore = parseISO(piano.dataInizio);
    const fine = parseISO(piano.dataFine);
    while(cursore <= fine){
      const iso = toISO(cursore);
      const gg = giornoSettimanaLunBase(cursore);
      if(piano.giorni.includes(gg) && !inFestivita(iso, piano.festivita) && !saltate.has(iso)){
        risultato.push(iso);
      }
      cursore.setDate(cursore.getDate()+1);
    }
  }
  extra.forEach(iso => { if(!risultato.includes(iso)) risultato.push(iso); });
  risultato.sort();
  return risultato;
}

function etichettaVerifica(v, modulo){
  const tipo = v.tipo === 'orale' ? 'Orale' : 'Scritta';
  const qualifica = v.qualifica === 'recupero' ? 'di recupero' : 'sommativa';
  return tipo + ' ' + qualifica + ' — ' + modulo.nome;
}

// Messaggio chiaro sul perché una verifica non è collocabile.
// esteso=true → testo lungo per il tooltip; esteso=false → etichetta breve.
function messaggioProblemaVerifica(motivo, esteso){
  switch(motivo){
    case 'non-lezione':
      return esteso
        ? 'La data scelta non è un giorno di lezione per questa classe (controlla i giorni della settimana o un periodo di vacanza). Scegli un altro giorno o lascia la data su "auto".'
        : 'non è un giorno di lezione';
    case 'spazio-durata':
      return esteso
        ? 'Da questa data non ci sono abbastanza lezioni disponibili per l\'intera durata della verifica prima della fine del periodo.'
        : 'lezioni insufficienti da qui';
    case 'spazio-dopo-modulo':
      return esteso
        ? 'Non ci sono abbastanza lezioni dopo il modulo per collocare la verifica entro la fine del periodo. Allunga il periodo o riduci le lezioni.'
        : 'niente spazio dopo il modulo';
    default:
      return esteso ? 'La verifica non è collocabile nel periodo indicato.' : 'non collocabile';
  }
}

// Assegna i moduli in sequenza sulle lezioni disponibili.
// Ogni verifica ha una data propria (fissata dall'utente o proposta automaticamente
// subito dopo il suo modulo). Le verifiche attive che "occupano lezioni" riservano
// i loro giorni ovunque cadano: i moduli in corso in quel punto scorrono di conseguenza.
function calcolaPianificazione(piano){
  const lezioni = calcolaLezioniDisponibili(piano);
  const indiceLezione = {}; // iso -> indice
  lezioni.forEach((iso, i)=> indiceLezione[iso] = i);

  const riservate = {};

  // 1) Riserva PRIMA tutte le lezioni delle verifiche con data FISSATA, attive e occupanti,
  //    ovunque cadano (anche in mezzo a un modulo successivo).
  function riservaDaData(iso, durata){
    const start = indiceLezione[iso];
    const indici = [];
    if(start == null){ return { indici, fuori:true, motivo:'non-lezione' }; }
    let count = 0;
    for(let i = start; i < lezioni.length && count < durata; i++){
      indici.push(i); count++;
    }
    return { indici, fuori: indici.length < durata, motivo: indici.length < durata ? 'spazio-durata' : null };
  }

  piano.moduli.forEach(m => {
    (m.verifiche||[]).forEach(v => {
      const attiva = v.attiva !== false;
      const occupano = attiva && v.occupaLezioni !== false;
      if(v.data && occupano){
        const durata = Math.max(1, Number(v.durataLezioni)||1);
        riservaDaData(v.data, durata).indici.forEach(i => riservate[i] = true);
      }
    });
  });

  // 2) Passaggio sequenziale: per ogni modulo assegna le lezioni di spiegazione
  //    (saltando le già riservate), poi colloca subito le sue verifiche a data AUTOMATICA
  //    riservando quei giorni, così il modulo successivo parte dopo di esse.
  let cursore = 0;
  const righe = [];
  let overflowTotale = 0;
  const verifichePianificate = [];

  piano.moduli.forEach(m => {
    const necessarie = Math.max(1, Number(m.lezioni)||1);
    const assegnate = [];
    let idx = cursore;
    while(assegnate.length < necessarie && idx < lezioni.length){
      if(!riservate[idx]) assegnate.push(idx);
      idx++;
    }
    cursore = idx;
    const overflow = assegnate.length < necessarie;
    if(overflow) overflowTotale += (necessarie - assegnate.length);

    let dataInizio, dataFine, ultimoIdx;
    if(assegnate.length > 0){
      dataInizio = lezioni[assegnate[0]];
      dataFine = lezioni[assegnate[assegnate.length-1]];
      ultimoIdx = assegnate[assegnate.length-1];
    } else if(lezioni.length > 0){
      dataInizio = dataFine = lezioni[Math.min(cursore, lezioni.length-1)];
      ultimoIdx = Math.min(cursore, lezioni.length-1);
    } else {
      dataInizio = dataFine = piano.dataInizio;
      ultimoIdx = -1;
    }
    const riga = { modulo: m, dataInizio, dataFine, lezioniAssegnate: assegnate.length, lezioniPreviste: necessarie, lezioniVerifica: 0, overflow };
    righe.push(riga);

    // verifiche del modulo: prima quelle a data automatica (collocate qui, in ordine),
    // che spingono in avanti il modulo successivo.
    (m.verifiche||[]).forEach(v => {
      const attiva = v.attiva !== false;
      const durata = Math.max(1, Number(v.durataLezioni)||1);
      const occupano = attiva && v.occupaLezioni !== false;
      let indici = [];
      let fuori = false;
      let motivo = null;

      if(v.data){
        const r = riservaDaData(v.data, durata);
        indici = r.indici; fuori = r.fuori; motivo = r.motivo;
      } else {
        let count = 0;
        for(let i = ultimoIdx + 1; i < lezioni.length && count < durata; i++){
          if(riservate[i]) continue;
          indici.push(i); count++;
          if(occupano) riservate[i] = true;
        }
        fuori = indici.length < durata;
        if(fuori) motivo = 'spazio-dopo-modulo';
        if(indici.length) ultimoIdx = Math.max(ultimoIdx, indici[indici.length-1]);
        // dopo una verifica automatica, il cursore dei moduli riparte da lì
        cursore = Math.max(cursore, (indici.length ? indici[indici.length-1] : ultimoIdx) + 1);
      }

      // Conta come "occupate" solo le lezioni effettivamente collocate;
      // le lezioni volute ma non collocabili (fuori periodo) diventano overflow.
      if(occupano){
        riga.lezioniVerifica += indici.length;
        const mancanti = durata - indici.length;
        if(mancanti > 0) overflowTotale += mancanti;
      }
      verifichePianificate.push({
        verifica: v,
        modulo: m,
        etichetta: etichettaVerifica(v, m),
        date: indici.map(i => lezioni[i]),
        attiva,
        dataAutomatica: !v.data,
        fuoriPeriodo: fuori,
        motivoProblema: motivo
      });
    });
  });

  return { lezioni, righe, verifiche: verifichePianificate, overflowTotale, lezioniUsate: cursore, lezioniTotali: lezioni.length };
}

// ---------- Esportazione crono programma in RTF (Word, Pages, TextEdit) ----------

function rtfEscape(s){
  return String(s==null?'':s)
    .replace(/\\/g,'\\\\')
    .replace(/\{/g,'\\{')
    .replace(/\}/g,'\\}')
    .replace(/[\u0080-\uffff]/g, c => '\\u' + c.charCodeAt(0) + '?');
}

function esportaCronoProgrammaWord(piano, calcolo){
  // larghezze colonne in twips (1440 twips = 1 pollice)
  const larghezze = [2900, 1400, 1400, 1100, 3200];

  function rigaTabella(celle, grassetto, larghezzeRiga){
    const ws = larghezzeRiga || larghezze;
    let cumR = 0;
    const cellxR = ws.map(w => (cumR += w));
    let r = '\\trowd\\trgaph108\\trleft0';
    cellxR.forEach(x => r += '\\cellx' + x);
    r += '\n\\intbl ';
    celle.forEach(c => {
      r += (grassetto ? '\\b ' : '') + rtfEscape(c) + (grassetto ? '\\b0' : '') + '\\cell ';
    });
    r += '\\row\n';
    return r;
  }

  let rtf = '{\\rtf1\\ansi\\ansicpg1252\\deff0\\deflang1040{\\fonttbl{\\f0\\fswiss\\fcharset0 Calibri;}}\n';
  rtf += '\\f0\\fs22\n';
  rtf += '{\\pard\\b\\fs32 Crono programma \\emdash ' + rtfEscape(piano.nome) + '\\par}\n';
  rtf += '{\\pard\\fs18\\sa240 Periodo: ' + rtfEscape(formattaDataBreve(piano.dataInizio)) + ' \\endash ' + rtfEscape(formattaDataBreve(piano.dataFine)) + '   \\emdash   ' + calcolo.lezioniTotali + ' lezioni disponibili nel periodo\\par}\n';
  rtf += rigaTabella(['Modulo','Lezioni spiegazione','Lezioni verifica','Totale','Periodo previsto'], true);
  calcolo.righe.forEach(r=>{
    rtf += rigaTabella([
      r.modulo.nome,
      String(r.lezioniPreviste),
      r.lezioniVerifica > 0 ? String(r.lezioniVerifica) : '\\endash',
      String(r.lezioniPreviste + r.lezioniVerifica),
      formattaDataBreve(r.dataInizio) + ' \\endash ' + formattaDataBreve(r.dataFine) + (r.overflow ? ' (lezioni insufficienti)' : '')
    ]);
  });

  if((calcolo.verifiche||[]).length > 0){
    const verificheOrdinate = calcolo.verifiche.slice()
      .filter(pv => pv.attiva && pv.date.length > 0)
      .sort((a,b)=> a.date[0].localeCompare(b.date[0]));
    if(verificheOrdinate.length > 0){
      rtf += '\\pard\\par\n';
      rtf += '{\\pard\\b\\fs26\\sb240 Calendario verifiche\\par}\n';
      rtf += '{\\pard\\sa120\\fs18 Le date potranno subire lievi variazioni in base allo svolgimento effettivo del programma.\\par}\n';
      const larghezzeVerifiche = [3600, 2200, 4200];
      rtf += rigaTabella(['Modulo','Tipo','Data / periodo'], true, larghezzeVerifiche);
      verificheOrdinate.forEach(pv=>{
        const tipo = (pv.verifica.tipo==='orale'?'Orale':'Scritta') + (pv.verifica.qualifica==='recupero'?' (recupero)':'');
        rtf += rigaTabella([
          pv.modulo.nome,
          tipo,
          formattaDataBreve(pv.date[0]) + (pv.date.length>1 ? ' \\endash ' + formattaDataBreve(pv.date[pv.date.length-1]) : '')
        ], false, larghezzeVerifiche);
      });
    }
  }

  rtf += '\\pard\\par}';

  const blob = new Blob([rtf], { type: 'application/rtf' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const nomeFile = piano.nome.replace(/[^a-z0-9àèéìòù ]/gi,'').trim().replace(/\s+/g,'_') || 'piano';
  a.download = nomeFile + '_crono_programma.rtf';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function formattaDataBreve(iso){
  if(!iso) return '';
  const d = parseISO(iso);
  return String(d.getDate()).padStart(2,'0') + ' ' + MESI_LABEL[d.getMonth()].slice(0,3) + ' ' + d.getFullYear();
}

        ${v.data
          ? `<button class="link-auto" data-azione="auto" title="Torna alla data automatica">↺ auto</button>`
          : `<span class="tag-auto" title="Data proposta automaticamente dopo il modulo">auto: ${dataProposta ? formattaDataBreve(dataProposta) : '—'}</span>`}
        ${pianificata && pianificata.fuoriPeriodo ? '<span class="avviso-inline" title="'+messaggioProblemaVerifica(pianificata.motivoProblema, true)+'">⚠︎ '+messaggioProblemaVerifica(pianificata.motivoProblema, false)+'</span>' : ''}
        <button class="azione-icona elimina" title="Rimuovi verifica">✕</button>
      `;
      rigaV.querySelector('[data-campo=attiva]').addEventListener('change', e=>{ v.attiva = e.target.checked; salvaDati(); renderTabellaModuli(piano); renderGanttOnly(); });
      rigaV.querySelector('[data-campo=tipo]').addEventListener('change', e=>{
        v.tipo = e.target.value;
        if(v.tipo==='orale' && (!v.durataLezioni || v.durataLezioni < 2)) v.durataLezioni = 3;
        if(v.tipo==='scritta') v.durataLezioni = 1;
        salvaDati(); renderTabellaModuli(piano); renderGanttOnly();
      });
      rigaV.querySelector('[data-campo=qualifica]').addEventListener('change', e=>{
        v.qualifica = e.target.value;
        if(v.qualifica==='recupero' && v.attiva===undefined) v.attiva = true;
        salvaDati(); renderTabellaModuli(piano); renderGanttOnly();
      });
      rigaV.querySelector('[data-campo=durata]').addEventListener('input', e=>{ v.durataLezioni = Math.max(1, parseInt(e.target.value)||1); salvaDati(); renderTabellaModuli(piano); renderGanttOnly(); });
      rigaV.querySelector('[data-campo=data]').addEventListener('change', e=>{ v.data = e.target.value || null; salvaDati(); renderTabellaModuli(piano); renderGanttOnly(); });
      const btnAuto = rigaV.querySelector('[data-azione=auto]');
      if(btnAuto) btnAuto.addEventListener('click', ()=>{ v.data = null; salvaDati(); renderTabellaModuli(piano); renderGanttOnly(); });
      rigaV.querySelector('.elimina').addEventListener('click', ()=>{ m.verifiche.splice(j,1); salvaDati(); renderTabellaModuli(piano); renderGanttOnly(); });
      td.appendChild(rigaV);
    });
    const btnV = document.createElement('button');
    btnV.className = 'btn-aggiungi-verifica-inline';
    btnV.textContent = '+ verifica';
    btnV.title = 'Aggiungi una verifica a questo modulo';
    btnV.addEventListener('click', ()=>{
      m.verifiche.push({ id: idCasuale(), tipo:'scritta', qualifica:'sommativa', durataLezioni:1, data:null, attiva:true, occupaLezioni:true });
      salvaDati(); renderTabellaModuli(piano); renderGanttOnly();
    });
    td.appendChild(btnV);
    trV.appendChild(td);
    corpo.appendChild(trV);
  });
}


function renderMiniCalendario(piano, calcolo){
  const cont = document.getElementById('mini-calendario');
  cont.innerHTML = '';
  if(!piano.dataInizio || !piano.dataFine){ return; }
  const wrap = document.createElement('div');
  wrap.className = 'mesi-calendario';
  const lezioniSet = new Set(calcolo.lezioni);
  const saltateMap = {}; const extraMap = {};
  piano.eccezioni.forEach(e=>{ if(e.tipo==='saltata') saltateMap[e.data]=true; if(e.tipo==='extra') extraMap[e.data]=true; });
  const verificheMap = {};
  (calcolo.verifiche||[]).forEach(pv => { if(pv.attiva) pv.date.forEach(iso => { verificheMap[iso] = pv; }); });

  let cursore = new Date(parseISO(piano.dataInizio).getFullYear(), parseISO(piano.dataInizio).getMonth(), 1);
  const fine = parseISO(piano.dataFine);
  let guardia = 0;
  while(cursore <= fine && guardia < 36){
    guardia++;
    const meseDiv = document.createElement('div');
    meseDiv.className = 'mese-cal';
    const titolo = document.createElement('div');
    titolo.className = 'titolo-mese';
    titolo.textContent = MESI_LABEL[cursore.getMonth()] + ' ' + cursore.getFullYear();
    meseDiv.appendChild(titolo);
    const griglia = document.createElement('div');
    griglia.className = 'griglia-giorni';
    const primoDelMese = new Date(cursore.getFullYear(), cursore.getMonth(), 1);
    const offset = giornoSettimanaLunBase(primoDelMese);
    for(let v=0; v<offset; v++){
      const vuota = document.createElement('div'); vuota.className='giorno-cella vuota'; griglia.appendChild(vuota);
    }
    const giorniNelMese = new Date(cursore.getFullYear(), cursore.getMonth()+1, 0).getDate();
    for(let g=1; g<=giorniNelMese; g++){
      const d = new Date(cursore.getFullYear(), cursore.getMonth(), g);
      const iso = toISO(d);
      const cella = document.createElement('div');
      const verificaQui = verificheMap[iso];
      let cls = 'giorno-cella';
      if(verificaQui) cls += ' verifica';
      else if(saltateMap[iso]) cls += ' saltata';
      else if(extraMap[iso]) cls += ' extra';
      else if(lezioniSet.has(iso)) cls += ' lezione';
      cella.className = cls;
      cella.textContent = g;
      cella.title = verificaQui ? verificaQui.etichetta : iso;
      if(verificaQui){
        // la data della verifica deriva dal modulo: si sposta da sola se il modulo slitta.
        // Per segnare il giorno come saltato (es. sciopero proprio quel giorno), clic: diventa saltata e la verifica scorre avanti.
        cella.addEventListener('click', ()=> toggleGiornoCalendario(piano, iso, true, false, false));
      } else if(iso >= piano.dataInizio && iso <= piano.dataFine){
        cella.addEventListener('click', ()=> toggleGiornoCalendario(piano, iso, lezioniSet.has(iso) || saltateMap[iso] || extraMap[iso], saltateMap[iso], extraMap[iso]));
      } else {
        cella.style.opacity = '0.3';
      }
      griglia.appendChild(cella);
    }
    meseDiv.appendChild(griglia);
    wrap.appendChild(meseDiv);
    cursore.setMonth(cursore.getMonth()+1);
  }
  cont.appendChild(wrap);
}

function toggleGiornoCalendario(piano, iso, eraLezioneOEccezione, eraSaltata, eraExtra){
  // ciclo di stato per il giorno cliccato:
  // lezione regolare -> saltata -> regolare
  // giorno non di lezione -> extra -> non di lezione
  const gg = giornoSettimanaLunBase(parseISO(iso));
  const regolare = piano.giorni.includes(gg) && !inFestivita(iso, piano.festivita);

  if(eraSaltata){
    piano.eccezioni = piano.eccezioni.filter(e => !(e.data===iso && e.tipo==='saltata'));
  } else if(eraExtra){
    piano.eccezioni = piano.eccezioni.filter(e => !(e.data===iso && e.tipo==='extra'));
  } else if(regolare){
    piano.eccezioni.push({ data: iso, tipo:'saltata', etichetta:'' });
  } else {
    piano.eccezioni.push({ data: iso, tipo:'extra', etichetta:'' });
  }
  salvaDati();
  render();
}

function renderGanttOnly(){
  const piano = pianoCorrente();
  if(!piano) return;
  const calcolo = calcolaPianificazione(piano);
  renderMiniCalendario(piano, calcolo);
  renderPannelloDiagramma(piano, calcolo);
}

// Ricostruisce SEMPRE insieme riepilogo, avviso ed esportazione: qualunque modifica
// (lezione saltata, vacanza, numero di lezioni di un modulo) passa da qui, così
// il conteggio "lezioni mancanti" non resta mai disallineato dal resto.
function renderPannelloDiagramma(piano, calcolo){
  const cont = document.getElementById('pannello-diagramma');
  if(!cont) return;
  const totSpieg = calcolo.righe.reduce((s,r)=>s+r.lezioniPreviste,0);
  const totVerif = calcolo.righe.reduce((s,r)=>s+r.lezioniVerifica,0);
  const totServe = totSpieg + totVerif + calcolo.overflowTotale;
  const sfora = calcolo.overflowTotale;
  cont.innerHTML = `
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;">
      <h3>Diagramma</h3>
      <button class="btn-aggiungi" id="btn-esporta-word">⤓ esporta crono programma (RTF — Word/Pages)</button>
    </div>
    ${sfora>0
      ? `<div class="banner-sforo">⚠︎ Stai sforando di <b>${sfora}</b> ${sfora===1?'lezione':'lezioni'}: la programmazione richiede <b>${totServe}</b> lezioni (${totSpieg} di spiegazione + ${totVerif+sfora} di verifica) ma nel periodo ne hai solo <b>${calcolo.lezioniTotali}</b>.</div>`
      : `<div class="banner-ok">✓ La programmazione ci sta: richiede <b>${totServe}</b> lezioni (${totSpieg} di spiegazione + ${totVerif} di verifica) su <b>${calcolo.lezioniTotali}</b> disponibili — margine di <b>${calcolo.lezioniTotali - totServe}</b> ${(calcolo.lezioniTotali-totServe)===1?'lezione':'lezioni'}.</div>`}
    <div class="gantt-riepilogo">
      <div><b>${calcolo.righe.filter(r=>!r.overflow).length}</b>/${piano.moduli.length} moduli entro fine periodo</div>
    </div>
    <div class="gantt-scroll"><div class="gantt" id="gantt-area"></div></div>
    ${calcolo.overflowTotale>0 ? `<div class="avviso">Con il calendario attuale non ci sono abbastanza lezioni per completare tutti i moduli entro il ${formattaDataBreve(piano.dataFine)}. Valuta di allungare il periodo, aggiungere lezioni extra o ridurre le lezioni previste in qualche modulo.</div>` : ''}
  `;
  document.getElementById('btn-esporta-word').addEventListener('click', ()=> esportaCronoProgrammaWord(piano, calcolo));
  renderGantt(piano, calcolo);
}

function renderGantt(piano, calcolo){
  const area = document.getElementById('gantt-area');
  if(!area) return;
  area.innerHTML = '';
  if(!piano.dataInizio || !piano.dataFine || piano.moduli.length===0){
    area.innerHTML = '<div style="color:var(--inchiostro-tenue); font-size:0.85rem; padding:20px;">Aggiungi date e almeno un modulo per vedere il diagramma.</div>';
    return;
  }
  const inizio = parseISO(piano.dataInizio);
  const fine = parseISO(piano.dataFine);
  const totaleGiorni = Math.max(1, (fine - inizio) / 86400000);

  // riga mesi
  const rigaMesi = document.createElement('div');
  rigaMesi.className = 'gantt-mesi';
  let cursoreMese = new Date(inizio.getFullYear(), inizio.getMonth(), 1);
  const segmenti = [];
  while(cursoreMese <= fine){
    const inizioSeg = cursoreMese < inizio ? inizio : new Date(cursoreMese);
    const fineMese = new Date(cursoreMese.getFullYear(), cursoreMese.getMonth()+1, 0);
    const fineSeg = fineMese > fine ? fine : fineMese;
    const giorniSeg = Math.max(1, (fineSeg - inizioSeg) / 86400000 + 1);
    segmenti.push({ label: MESI_LABEL[cursoreMese.getMonth()].slice(0,3), giorni: giorniSeg });
    cursoreMese.setMonth(cursoreMese.getMonth()+1);
  }
  segmenti.forEach(s => {
    const el = document.createElement('div');
    el.className = 'gantt-mese-label';
    el.style.flex = s.giorni + ' 0 0';
    el.textContent = s.label;
    rigaMesi.appendChild(el);
  });
  area.appendChild(rigaMesi);

  const oggi = new Date();
  const offsetOggiPerc = oggi >= inizio && oggi <= fine ? ((oggi - inizio)/86400000 / totaleGiorni * 100) : null;

  const corpoGantt = document.createElement('div');
  corpoGantt.style.position = 'relative';

  calcolo.righe.forEach((riga, i) => {
    const rigaEl = document.createElement('div');
    rigaEl.className = 'riga-gantt';
    const dIn = parseISO(riga.dataInizio);
    const dFi = parseISO(riga.dataFine);
    const leftPerc = Math.max(0, (dIn - inizio)/86400000 / totaleGiorni * 100);
    const widthPerc = Math.max(1.2, ((dFi - dIn)/86400000 + 1) / totaleGiorni * 100);
    const barra = document.createElement('div');
    barra.className = 'barra-modulo' + (riga.overflow ? ' overflow':'');
    barra.style.left = leftPerc + '%';
    barra.style.width = widthPerc + '%';
    barra.style.background = riga.overflow ? '' : PALETTE_BARRE[i % PALETTE_BARRE.length];
    barra.textContent = riga.modulo.nome + ' · ' + riga.lezioniAssegnate + '/' + riga.lezioniPreviste;
    barra.title = riga.modulo.nome + ': ' + formattaDataBreve(riga.dataInizio) + ' – ' + formattaDataBreve(riga.dataFine) + (riga.overflow ? ' (lezioni insufficienti)':'');
    rigaEl.appendChild(barra);
    corpoGantt.appendChild(rigaEl);
  });

  if(offsetOggiPerc !== null){
    const linea = document.createElement('div');
    linea.className = 'oggi-linea';
    linea.style.left = offsetOggiPerc + '%';
    const etichetta = document.createElement('div');
    etichetta.className = 'oggi-etichetta';
    etichetta.style.left = offsetOggiPerc + '%';
    etichetta.textContent = 'oggi';
    linea.appendChild(etichetta);
    corpoGantt.appendChild(linea);
  }

  // marcatori delle verifiche (date calcolate: seguono i moduli)
  (calcolo.verifiche||[]).forEach(pv=>{
    if(!pv.attiva || !pv.date.length) return;
    const dDa = parseISO(pv.date[0]);
    const dA = parseISO(pv.date[pv.date.length-1]);
    if(dA < inizio || dDa > fine) return;
    const leftPerc = Math.max(0, (dDa - inizio)/86400000 / totaleGiorni * 100);
    const widthPerc = Math.max(0.6, ((dA - dDa)/86400000 + 1) / totaleGiorni * 100);
    const marcatore = document.createElement('div');
    marcatore.className = 'verifica-marcatore';
    marcatore.style.left = leftPerc + '%';
    marcatore.style.width = widthPerc + '%';
    marcatore.title = pv.etichetta + ': ' + formattaDataBreve(pv.date[0]) + (pv.date.length>1 ? ' – ' + formattaDataBreve(pv.date[pv.date.length-1]) : '');
    const etichettaV = document.createElement('div');
    etichettaV.className = 'verifica-etichetta';
    etichettaV.textContent = '✎ ' + pv.etichetta;
    marcatore.appendChild(etichettaV);
    corpoGantt.appendChild(marcatore);
  });

  corpoGantt.style.minHeight = (calcolo.righe.length * 40) + 'px';

  area.appendChild(corpoGantt);
}

// ---------- Backup su file (esporta / ripristina) ----------

function mostraNotaBackup(testo, classe){
  const nota = document.getElementById('nota-backup');
  if(!nota) return;
  nota.textContent = testo;
  nota.className = 'nota-backup' + (classe ? ' ' + classe : '');
  if(classe){
    clearTimeout(mostraNotaBackup._t);
    mostraNotaBackup._t = setTimeout(()=>{
      nota.className = 'nota-backup';
      nota.textContent = 'Consiglio: salva il file nel tuo Google Drive dopo modifiche importanti.';
    }, 5000);
  }
}

function esportaBackup(){
  const dati = {
    _formato: 'pianificatore-backup',
    _versione: 1,
    _dataEsportazione: new Date().toISOString(),
    stato: stato
  };
  const blob = new Blob([JSON.stringify(dati, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const oggi = new Date();
  const stamp = oggi.getFullYear() + '-' + String(oggi.getMonth()+1).padStart(2,'0') + '-' + String(oggi.getDate()).padStart(2,'0');
  const nPiani = (stato.piani||[]).length;
  a.download = 'pianificatore_backup_' + stamp + '_' + nPiani + 'piani.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  ultimoBackup = Date.now();
  mostraNotaBackup('Backup salvato (' + nPiani + ' ' + (nPiani===1?'piano':'piani') + '). Conservalo nel tuo Drive.', 'ok');
}

function importaBackup(file){
  const reader = new FileReader();
  reader.onload = e => {
    try{
      const dati = JSON.parse(e.target.result);
      let statoImportato = null;
      if(dati && dati._formato === 'pianificatore-backup' && dati.stato && Array.isArray(dati.stato.piani)){
        statoImportato = dati.stato;
      } else if(dati && Array.isArray(dati.piani)){
        statoImportato = dati; // tolleranza: file che contiene direttamente lo stato
      }
      if(!statoImportato){
        mostraNotaBackup('File non valido: non sembra un backup del pianificatore.', 'errore');
        return;
      }
      const nPiani = statoImportato.piani.length;
      const conferma = confirm(
        'Ripristinare ' + nPiani + ' ' + (nPiani===1?'piano':'piani') + ' da questo file?\n\n' +
        'ATTENZIONE: i piani attualmente presenti in questo dispositivo verranno sostituiti da quelli del file.\n\n' +
        'Se vuoi prima mettere al sicuro lo stato attuale, annulla e usa "Salva backup su file".'
      );
      if(!conferma) return;
      stato = statoImportato;
      if(!stato.pianoAttivo && stato.piani.length) stato.pianoAttivo = stato.piani[0].id;
      salvaDati();
      ultimoBackup = Date.now(); // subito dopo il ripristino, il file su disco coincide con i dati
      render();
      mostraNotaBackup('Ripristino completato: ' + nPiani + ' ' + (nPiani===1?'piano':'piani') + '.', 'ok');
    }catch(err){
      console.error(err);
      mostraNotaBackup('Impossibile leggere il file (formato non riconosciuto).', 'errore');
    }
  };
  reader.onerror = () => mostraNotaBackup('Errore nella lettura del file.', 'errore');
  reader.readAsText(file);
}

document.getElementById('btn-esporta-backup').addEventListener('click', esportaBackup);
document.getElementById('btn-importa-backup').addEventListener('click', ()=> document.getElementById('input-file-backup').click());
document.getElementById('input-file-backup').addEventListener('change', e=>{
  const file = e.target.files && e.target.files[0];
  if(file) importaBackup(file);
  e.target.value = ''; // consente di re-importare lo stesso file
});

// Promemoria alla chiusura/ricarica: se ci sono modifiche più recenti dell'ultimo
// backup su file, il browser mostra l'avviso nativo "vuoi lasciare la pagina?".
// (I dati restano comunque salvati nel browser; questo serve solo a ricordare il backup su file.)
window.addEventListener('beforeunload', e=>{
  if(ultimaModifica > ultimoBackup && (stato.piani||[]).length > 0){
    e.preventDefault();
    e.returnValue = ''; // richiesto da alcuni browser per attivare l'avviso
    return '';
  }
});

if(stato.piani.length === 0){
  render();
} else {
  if(!stato.pianoAttivo) stato.pianoAttivo = stato.piani[0].id;
  render();
}
